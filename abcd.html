<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>MindWell AI – Sharp Interactive Plus</title>

    <style>
        body {
            margin: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logo-wrapper {
            width: 240px;
            height: 240px;
            perspective: 900px;
        }

        .logo {
            width: 100%;
            height: 100%;
        }

        .ring {
            animation: breathe 4s ease-in-out infinite;
            filter: drop-shadow(0 0 14px rgba(120, 150, 255, 0.55));
        }

        .plus-group {
            transition: transform 0.15s ease-out;
            cursor: pointer;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(0.96);
                opacity: 0.75;
            }

            50% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="logo-wrapper">
        <svg class="logo" viewBox="0 0 200 200">

            <!-- Outer Ring -->
            <circle class="ring" cx="100" cy="100" r="70" stroke="#9bb6ff" stroke-width="10" fill="none" />

            <!-- SHARP PLUS (tapered ends using polygons) -->
            <g id="plus" class="plus-group" fill="#9bb6ff">

                <!-- Vertical -->
                <polygon points="
      97,65
      103,65
      106,75
      106,125
      103,135
      97,135
      94,125
      94,75
    " />

                <!-- Horizontal -->
                <polygon points="
      65,97
      75,94
      125,94
      135,97
      135,103
      125,106
      75,106
      65,103
    " />

            </g>
        </svg>
    </div>

    <script>
        const plus = document.getElementById("plus");
        const wrapper = document.querySelector(".logo-wrapper");

        let active = false;

        wrapper.addEventListener("mousedown", () => active = true);
        window.addEventListener("mouseup", () => {
            active = false;
            plus.style.transform = "translate(0,0)";
        });

        wrapper.addEventListener("mousemove", (e) => {
            if (!active) return;

            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            // Limit movement (subtle = premium)
            const maxMove = 10;
            const moveX = Math.max(-maxMove, Math.min(maxMove, x / 10));
            const moveY = Math.max(-maxMove, Math.min(maxMove, y / 10));

            plus.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>

</body>

</html>
